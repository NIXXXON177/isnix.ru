# config/tab/config.yml — фрагмент (header/footer и прочее на сервере оставьте как есть).
# Слейте эти секции в свой config.yml, если их нет или сломаны форматы имён.

tablist-name-format:
  enabled: true
  anti-override: true
  format: "%tabprefix%&f%player%&r%tabsuffix%"

above-name-format:
  enabled: true
  format: "%tagprefix%%player%&r%tagsuffix%"

# Дубликат для TAB 5.5+ (должен быть выключен, если включён tablist-name-format выше):
tablist-name-formatting:
  enabled: false
