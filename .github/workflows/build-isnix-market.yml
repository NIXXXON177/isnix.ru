name: Build ISNIX Market mod

on:
  push:
    branches: [main]
    paths:
      - 'isnix-market/**'
      - '.github/workflows/build-isnix-market.yml'
  pull_request:
    branches: [main]
    paths:
      - 'isnix-market/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build mod
        working-directory: isnix-market
        run: chmod +x gradlew && ./gradlew build --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: isnix-market-jar
          path: isnix-market/build/libs/isnix-market-*.jar
          if-no-files-found: error
