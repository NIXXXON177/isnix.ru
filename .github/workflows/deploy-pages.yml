# GitHub Pages: подставляет anon key из секрета и публикует сайт
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Write auth-config.js
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::Add repository secret SUPABASE_ANON_KEY (Supabase publishable key)"
            exit 1
          fi
          BASE_URL="${SUPABASE_URL:-https://yfrlgeztbaebdapdnefy.supabase.co}"
          BASE_URL="${BASE_URL%/}"
          case "$BASE_URL" in
            https://*) ;;
            *)
              echo "::error::SUPABASE_URL must start with https:// (got: $BASE_URL)"
              exit 1
              ;;
          esac
          # /ely/skin/ только на Cloudflare Worker, не на *.supabase.co
          SKIN_PROXY_URL="https://api.isnix.ru/ely/skin/"
          case "$BASE_URL" in
            *api.isnix.ru*|*.workers.dev*)
              SKIN_PROXY_URL="${BASE_URL}/ely/skin/"
              ;;
          esac
          echo "Using supabaseUrl=$BASE_URL elySkinProxyUrl=$SKIN_PROXY_URL"
          printf '%s\n' \
            '/** Generated by Deploy Pages — do not edit on production */' \
            'window.ISNIX_AUTH = {' \
            '	enabled: true,' \
            "	supabaseUrl: '${BASE_URL}'," \
            "	supabaseAnonKey: '${SUPABASE_ANON_KEY}'," \
            "	elySkinProxyUrl: '${SKIN_PROXY_URL}'," \
            '}' \
            > assets/js/auth-config.js

      - name: Write metrika-config.js
        env:
          YANDEX_METRIKA_COUNTER_ID: ${{ secrets.YANDEX_METRIKA_COUNTER_ID }}
        run: |
          ID="${YANDEX_METRIKA_COUNTER_ID:-109813008}"
          case "$ID" in
            ''|*[!0-9]*)
              ID=0
              ;;
          esac
          printf '%s\n' \
            '/** Generated by Deploy Pages — do not edit on production */' \
            'window.ISNIX_METRIKA = {' \
            "	counterId: ${ID}," \
            '	webvisor: true,' \
            '}' \
            > assets/js/metrika-config.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
