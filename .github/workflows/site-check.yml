# Проверка структуры сайта перед публикацией на GitHub Pages
name: Site check

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'index-full.html'
      - 'how-to-play.html'
      - 'whitelist.html'
      - 'admin.html'
      - 'account.html'
      - 'status.html'
      - 'support.html'
      - 'appeals.html'
      - 'assets/**'
      - 'robots.txt'
      - 'sitemap.xml'
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Required files exist
        run: |
          test -f index.html
          test -f index-full.html
          test -f whitelist.html
          test -f admin.html
          test -f account.html
          test -f status.html
          test -f how-to-play.html
          test -f support.html
          test -f appeals.html
          test -f assets/js/appeals-page.js
          test -f assets/js/support-tickets.js
          test -f assets/css/support.css
          test -f assets/css/main.css
          test -f assets/css/components.css
          test -f assets/css/auth.css
          test -f assets/css/site-header.css
          test -f assets/js/browser-compat.js
          test -f assets/js/site.js
          test -f assets/js/site-header.js
          test -f assets/js/auth.js
          test -f assets/js/maintenance-splash.js
          test -f assets/css/update-splash.css
          test -f assets/js/whitelist-page.js
          test -f assets/js/admin-page.js
          test -f assets/js/server-status.js
          test -f assets/js/status-page.js
          test -f assets/js/auth-config.js
          test -f assets/js/shop-slider.js
          test -f whitelist.json
          test -f downloads/ISTHISNIXXXONmods.zip

      - name: Homepage and asset links
        run: |
          # Публичная главная — заставка обновления (не полный сайт)
          grep -q 'assets/css/update-splash.css' index.html
          grep -q 'assets/js/maintenance-splash.js' index.html
          grep -q 'whitelist.html' index.html
          grep -q 'site-maintenance' index.html
          ! grep -q 'cdn.tailwindcss.com' index.html

          # Полная главная сохранена для восстановления
          grep -q 'assets/css/main.css' index-full.html
          grep -q 'assets/js/site.js' index-full.html
          grep -q 'assets/js/site-header.js' index-full.html
          grep -q 'assets/js/shop-slider.js' index-full.html
          ! grep -q 'cdn.tailwindcss.com' index-full.html

          # Форма вайтлиста
          grep -q 'browser-compat.js' whitelist.html
          grep -q 'whitelist-page.js' whitelist.html
