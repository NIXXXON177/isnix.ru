# Сборка isnix-server-messages и автозаливка в mods/ на Play2GO (push в main).

name: Build isnix-server-messages

on:
  push:
    branches: [main]
    paths:
      - 'isnix-server-messages/**'
      - '.github/workflows/build-isnix-server-messages.yml'
      - '.github/workflows/reusable-deploy-mod-sftp.yml'
      - '.github/scripts/push_sftp.py'
  pull_request:
    branches: [main]
    paths:
      - 'isnix-server-messages/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build mod
        working-directory: isnix-server-messages
        run: chmod +x gradlew && ./gradlew build --no-daemon

      - name: Locate release JAR
        id: jar
        working-directory: isnix-server-messages
        run: |
          JAR=$(ls build/libs/isnix-server-messages-*.jar | grep -v sources | head -1)
          echo "path=build/libs/$(basename "$JAR")" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: isnix-server-messages-jar
          path: isnix-server-messages/${{ steps.jar.outputs.path }}
          if-no-files-found: error

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    uses: ./.github/workflows/reusable-deploy-mod-sftp.yml
    secrets: inherit
    with:
      artifact-name: isnix-server-messages-jar
