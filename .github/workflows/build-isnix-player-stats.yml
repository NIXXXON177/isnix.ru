name: Build ISNIX Player Stats mod

on:
  push:
    branches: [main]
    paths:
      - 'isnix-player-stats/**'
      - '.github/workflows/build-isnix-player-stats.yml'
  pull_request:
    branches: [main]
    paths:
      - 'isnix-player-stats/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build mod
        working-directory: isnix-player-stats
        run: chmod +x gradlew && ./gradlew build --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: isnix-player-stats-jar
          path: isnix-player-stats/build/libs/isnix-player-stats-1.0.1.jar
          if-no-files-found: error
